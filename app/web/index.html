<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="frontend_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ExamCore - SMKN 1 Parittiga</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b2242;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #splash-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0b2242 0%, #173a6a 100%);
      color: #ffffff;
      z-index: 9999;
    }
    #splash-screen .splash-card {
      max-width: 360px;
      width: 100%;
      padding: 32px 24px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(18px);
      text-align: center;
    }
    #splash-screen .splash-logo {
      width: 160px;
      height: 160px;
      object-fit: contain;
      margin: 0 auto 22px;
      display: block;
      border-radius: 28px;
      background: #fff;
      padding: 18px;
    }
    #splash-screen h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.1em;
      font-weight: 700;
    }
    #splash-screen p {
      margin: 12px 0 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
    }
    #splash-screen .loader {
      margin: 24px auto 0;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 5px solid rgba(255, 255, 255, 0.18);
      border-top-color: #ffffff;
      animation: spin 1.1s infinite linear;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div class="splash-card">
      <img class="splash-logo" src="assets/images/smk_parittiga_logo.png" alt="SMKN 1 Parittiga Logo" />
      <h1>SMKN 1 Parittiga</h1>
      <p>Sistem Ujian Online</p>
      <div class="loader"></div>
    </div>
  </div>
  <script>
    const splash = document.getElementById('splash-screen');
    const removeSplash = () => {
      if (!splash || splash.style.display === 'none') return;
      splash.style.display = 'none';
    };
    window.addEventListener('flutter-first-frame', removeSplash);
    window.addEventListener('DOMContentLoaded', () => {
      window.setTimeout(removeSplash, 9000);
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Paksa HTML renderer untuk hindari bug WebGL/CanvasKit
    window.flutterWebRenderer = 'html';
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
